volumes:
  etc_wireguard:

services:
  amnezia-wg-easy:
    # Base image is amd64-only; on Apple Silicon / arm64 hosts Docker emulates — set explicitly to avoid the
    # "platform does not match" warning and document intent.
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    # Local-only name: without pull_policy, Compose tries Docker Hub for "amnezia-wg-easy" and fails.
    image: amnezia-wg-easy:local
    pull_policy: never
    env_file:
      - .env
    container_name: amnezia-wg-easy
    volumes:
      - etc_wireguard:/etc/wireguard
    ports:
      # WireGuard UDP: one port or a range (host range = container range). Default = WG_PORT only.
      # Set WG_UDP_PORT_RANGE=51820-52100 in .env to expose many tunnels without extra lines; tighten firewall.
      - "${WG_UDP_PORT_RANGE:-${WG_PORT}-${WG_PORT}}:${WG_UDP_PORT_RANGE:-${WG_PORT}-${WG_PORT}}/udp"
      - "${PORT}:${PORT}/tcp"
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
      # - NET_RAW # ⚠️ Uncomment if using Podman
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    devices:
    - /dev/net/tun:/dev/net/tun
